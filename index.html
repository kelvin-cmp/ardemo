<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>8th Wall Web: Manipulate</title>
    
    <!-- We've included a slightly modified version of A-Frame, which fixes some polish concerns -->
    <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

    <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
    <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
    

    <!-- Landing Pages - see https://www.8thwall.com/docs/web/#landing-pages -->
    <!-- <script src='//cdn.8thwall.com/web/landing-page/landing-page.js'></script> -->

    <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>

      <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    <script src="app.js"></script>
  </head>

  <body>
    <a-scene
      xrextras-gesture-detector
      //landing-page
      xrextras-loading
      xrextras-runtime-error
      renderer="colorManagement: true"
      xrweb="allowedDevices: any">

      <a-assets>
    <!-- Define the video asset -->
      <video id="my-video" src="assets/cat.mp4" playsinline webkit-playsinline mute autoplay loop="true"></video>
      <video
        id="scan-video"
        autoplay
        muted
        crossorigin="anonymous"
        loop="true"
        src="assets/cat.mp4">
      </video>
    
    </a-assets>

  
  
      <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
      <a-camera
        id="camera"
        position="0 8 8"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
        <!-- Display the video on a plane, for example -->
  <a-video src="#my-video" width="0.8" height="0.45" position=" 0.4 -0.8 -2" material="shader: chromakey; src: #my-video; color: 0.1 0.9 0.2"></a-video>
      </a-camera>
<xrextras-named-image-target name="target_jelly">
      <a-entity
        xrextras-play-video="video: #scan-video;  canstop: false"
        geometry="primitive: plane; height: 1; width: 0.79;"
        material="shader: chromakey; src:#scan-video; color: 0.1 0.9 0.2"
      ></a-entity>
    </xrextras-named-image-target>
    </a-scene>
  </body>
</html>
